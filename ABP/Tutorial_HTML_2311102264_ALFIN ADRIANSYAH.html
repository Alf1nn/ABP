<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Form Data Mahasiswa</title>
</head>
<body>

<h2>Data Mahasiswa</h2>

<form id="formMahasiswa">
<table>
<tr>
<td>NIM :</td>
<td><input type="text" name="nim" required></td>
</tr>

<tr>
<td>Nama :</td>
<td><input type="text" name="nama" required></td>
</tr>

<tr>
<td>Tgl Lahir :</td>
<td><input type="date" name="tgl_lahir" required></td>
</tr>

<tr>
<td>Jenis Kelamin :</td>
<td>
<label><input type="radio" name="jk" value="Laki-Laki" required> Laki-Laki</label>
<label><input type="radio" name="jk" value="Perempuan"> Perempuan</label>
</td>
</tr>

<tr>
<td>Alamat :</td>
<td><textarea name="alamat" required></textarea></td>
</tr>

<tr>
<td>Tinggal di :</td>
<td>
<select name="tinggal" required>
<option value="">--pilih--</option>
<option value="Kos/kontrakan">Kos/kontrakan</option>
<option value="Rumah saudara">Rumah saudara</option>
<option value="Rumah orang tua">Rumah orang tua</option>
</select>
</td>
</tr>

<tr>
<td>Pilih hobi :</td>
<td>
<label><input type="checkbox" name="hobi" value="Science"> Science</label><br>
<label><input type="checkbox" name="hobi" value="Technology"> Technology</label><br>
<label><input type="checkbox" name="hobi" value="Art"> Art</label><br>
<label><input type="checkbox" name="hobi" value="Sport"> Sport</label>
</td>
</tr>

<tr>
<td colspan="2">
<button type="submit">Submit</button>
<button type="reset" onclick="document.getElementById('outputArea').style.display='none'">Reset</button>
</td>
</tr>
</table>
</form>

<br><br>

<div id="outputArea" style="display:none;">
<h3>Hasil Input Data</h3>

<table>
<tr>
<td>NIM</td>
<td>: <span id="out-nim"></span></td>
</tr>

<tr>
<td>Nama</td>
<td>: <span id="out-nama"></span></td>
</tr>

<tr>
<td>Tanggal Lahir</td>
<td>: <span id="out-tgl"></span></td>
</tr>

<tr>
<td>Jenis Kelamin</td>
<td>: <span id="out-jk"></span></td>
</tr>

<tr>
<td>Alamat</td>
<td>: <span id="out-alamat"></span></td>
</tr>

<tr>
<td>Tinggal di</td>
<td>: <span id="out-tinggal"></span></td>
</tr>

<tr>
<td>Hobi</td>
<td>: <span id="out-hobi"></span></td>
</tr>
</table>
</div>

</body>
</html>
