<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Javascript Exercise</title>

<link rel="stylesheet" href="css/style.css">

<script>

// ===== hitung bilangan ganjil =====
function hitungGanjil(){

  var min = parseInt(document.getElementById("min").value);
  var max = parseInt(document.getElementById("max").value);

  var total = 0;

  for(var i = min; i <= max; i++){
    if(i % 2 != 0){
      total += i;
    }
  }

  document.getElementById("hasil").innerHTML = "Result : " + total;
}


// ===== ubah alignment text =====
var alignState = false;

function changeAlign(){

  var text = document.querySelector(".brand");

  if(!alignState){
    text.style.textAlign = "center";
    alignState = true;
  }else{
    text.style.textAlign = "right";
    alignState = false;
  }
}


// ===== ubah warna box =====
var colorState = false;

function changeColor(){

  var box = document.querySelector(".tile--green");

  if(!colorState){
    box.style.backgroundColor = "purple";
    colorState = true;
  }else{
    box.style.backgroundColor = "";
    colorState = false;
  }
}

</script>

<style>
.calculator{
width:320px;
margin:40px auto;
text-align:left;
}

.calculator input{
width:100%;
padding:6px;
margin-top:4px;
}

.calculator button{
margin-top:10px;
}

.center-btn{
text-align:center;
margin-top:10px;
}
</style>

</head>

<body>

<header class="page-header">

<div class="brand">
<span class="brand-online">ONLINE</span>
<span class="brand-media">MEDIA</span>
</div>

<div class="center-btn">
<button onclick="changeAlign()">Change Text Alignment</button>
</div>

</header>


<main class="page-main">

<!-- calculator -->
<div class="calculator">

<h3>Odd Number Calculator</h3>

<label>Min</label>
<input type="number" id="min">

<label>Max</label>
<input type="number" id="max">

<button onclick="hitungGanjil()">Calculate</button>

<p id="hasil">Result : 0</p>

</div>


<div class="center-btn">
<button onclick="changeColor()">Change Box Color</button>
</div>


<!-- tile tetap seperti template -->
<section class="tile-grid">

<div class="tile tile--green">
<div class="tile__label">Sample Box</div>
</div>

<div class="tile tile--orange">
<div class="tile__label">Example</div>
</div>

</section>

</main>

</footer>

</body>
</html>
